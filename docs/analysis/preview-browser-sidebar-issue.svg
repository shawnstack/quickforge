<svg xmlns="http://www.w3.org/2000/svg" width="960" height="624" viewBox="0 0 960 624" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="624" fill="#ffffff"/>

  <!-- 标题 -->
  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">右侧侧边栏浏览器预览打不开 · 调用链断裂分析</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#64748b">设了 view='browser'，却从未创建 browser reader tab —— 链路在第③步断掉</text>

  <!-- 中线 -->
  <line x1="480" y1="84" x2="480" y2="478" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- 栏标题 -->
  <text x="240" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">期望路径（设计意图）</text>
  <text x="720" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">实际路径（当前行为）</text>

  <!-- ============ 左栏节点 ============ -->
  <!-- N1 -->
  <rect x="60" y="120" width="360" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="153" text-anchor="middle" font-size="13" fill="#14532d">① 触发：点击 artifact 预览 / 自动预览</text>
  <!-- N2 -->
  <rect x="60" y="216" width="360" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="249" text-anchor="middle" font-size="13" fill="#14532d">② 设置 ui.workspacePanelView = 'browser'</text>
  <!-- N3 -->
  <rect x="60" y="312" width="360" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="336" text-anchor="middle" font-size="13" fill="#14532d">③ 自动创建 browser reader tab</text>
  <text x="240" y="356" text-anchor="middle" font-size="13" fill="#14532d">并 setActiveReaderTabId</text>
  <!-- N4 -->
  <rect x="60" y="408" width="360" height="56" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="240" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">④ isBrowserActive = true</text>
  <text x="240" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">→ 渲染 &lt;iframe&gt; 浏览器预览 ✓</text>

  <!-- 左栏箭头 -->
  <line x1="240" y1="178" x2="240" y2="214" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="240" y1="274" x2="240" y2="310" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="240" y1="370" x2="240" y2="406" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ============ 右栏节点 ============ -->
  <!-- N1 -->
  <rect x="540" y="120" width="360" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="720" y="153" text-anchor="middle" font-size="13" fill="#334155">① 触发：点击 artifact 预览 / 自动预览</text>
  <!-- N2 -->
  <rect x="540" y="216" width="360" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="720" y="249" text-anchor="middle" font-size="13" fill="#334155">② 设置 ui.workspacePanelView = 'browser'</text>
  <!-- N3 断点 -->
  <rect x="540" y="312" width="360" height="56" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="720" y="336" text-anchor="middle" font-size="13" fill="#991b1b">③ 同步 effect：find(browser tab) = undefined</text>
  <text x="720" y="356" text-anchor="middle" font-size="13" fill="#991b1b">readerTabs 为空 → 不创建任何 tab ✗ 断点</text>
  <!-- N4 -->
  <rect x="540" y="408" width="360" height="56" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="720" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">④ isBrowserActive = false</text>
  <text x="720" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">→ 渲染文件树，iframe 不出现 ✗</text>

  <!-- 右栏箭头 -->
  <line x1="720" y1="178" x2="720" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="720" y1="274" x2="720" y2="310" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="720" y1="370" x2="720" y2="406" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 断点爆裂标记 -->
  <circle cx="720" cy="340" r="0" fill="none"/>
  <text x="900" y="346" text-anchor="middle" font-size="22">💥</text>

  <!-- ============ 根因框 ============ -->
  <rect x="60" y="492" width="840" height="92" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="516" font-size="13" font-weight="700" fill="#92400e">根因</text>
  <text x="480" y="536" text-anchor="middle" font-size="12.5" fill="#78350f">openArtifactPreview() 与自动预览 effect（App.tsx:369-397）只设 view='browser'，</text>
  <text x="480" y="554" text-anchor="middle" font-size="12.5" fill="#78350f">却从不调用 openBrowserTab()（WorkspaceInspector.tsx:697，唯一创建 browser tab 的入口）。</text>
  <text x="480" y="572" text-anchor="middle" font-size="12.5" fill="#78350f">且 Inspector 每次 {`{open && ...}`} 重新挂载时 readerTabs 被重置为 []，603-611 行同步 effect 找不到 tab。</text>

  <!-- 修复提示 -->
  <rect x="60" y="594" width="840" height="22" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="609" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">建议修复：在 view==='browser' 且 readerTabs 无 browser tab 时，自动调用 openBrowserTab()。</text>
</svg>

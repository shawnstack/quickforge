<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 880" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="620" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">QuickForge · 对话默认工作目录统一设计</text>
  <text x="620" y="66" text-anchor="middle" font-size="15" fill="#64748b">目标：global 对话获得默认 workspace = ~/.quickforge/workspace，工作区能力与 project 对话一致</text>

  <!-- ============ BEFORE ============ -->
  <rect x="24" y="90" width="1192" height="330" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="48" y="120" font-size="18" font-weight="700" fill="#b91c1c">① 现状 Before — global 对话没有工作目录</text>

  <!-- global lane -->
  <g>
    <rect x="48" y="142" width="300" height="252" rx="12" fill="#ffffff" stroke="#fca5a5"/>
    <text x="68" y="170" font-size="14" font-weight="700" fill="#b91c1c">新对话 (global)</text>
    <text x="68" y="192" font-size="13" fill="#334155">scope = 'global'</text>
    <text x="68" y="212" font-size="13" fill="#334155">projectId = null</text>
    <text x="68" y="240" font-size="13" fill="#334155">→ createAgent()</text>
    <rect x="60" y="256" width="276" height="120" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="72" y="280" font-size="13" font-weight="600" fill="#991b1b">projectContext = null</text>
    <text x="72" y="304" font-size="12.5" fill="#7f1d1d">• workspace 工具：不装载</text>
    <text x="72" y="324" font-size="12.5" fill="#7f1d1d">• beforeToolCall：硬拦截</text>
    <text x="80" y="342" font-size="11.5" fill="#b91c1c" font-style="italic">"No active project..."</text>
    <text x="72" y="362" font-size="12.5" fill="#7f1d1d">• 系统提示词：无 workspace</text>
  </g>

  <!-- frontend before -->
  <g>
    <rect x="900" y="142" width="292" height="252" rx="12" fill="#ffffff" stroke="#fca5a5"/>
    <text x="920" y="170" font-size="14" font-weight="700" fill="#b91c1c">前端 (global)</text>
    <rect x="912" y="186" width="268" height="186" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="924" y="210" font-size="13" font-weight="600" fill="#991b1b">currentToolProject = undefined</text>
    <text x="924" y="236" font-size="12.5" fill="#7f1d1d">• 工作区面板按钮 disabled</text>
    <text x="924" y="256" font-size="12.5" fill="#7f1d1d">• TerminalDock 无目录</text>
    <text x="924" y="276" font-size="12.5" fill="#7f1d1d">• Git/文件树：隐藏</text>
    <text x="924" y="296" font-size="12.5" fill="#7f1d1d">• artifact 预览：禁用</text>
    <text x="924" y="324" font-size="12" fill="#9f1239">= 对话里完全不能碰文件</text>
  </g>

  <!-- project lane (unchanged) -->
  <g>
    <rect x="470" y="142" width="300" height="252" rx="12" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="490" y="170" font-size="14" font-weight="700" fill="#047857">新项目对话 (project)</text>
    <text x="490" y="192" font-size="13" fill="#334155">scope = 'project'</text>
    <text x="490" y="212" font-size="13" fill="#334155">projectId = X</text>
    <text x="490" y="240" font-size="13" fill="#334155">→ createAgent()</text>
    <rect x="482" y="256" width="276" height="120" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="494" y="280" font-size="13" font-weight="600" fill="#065f46">projectContext = {project, workspaceRoot}</text>
    <text x="494" y="304" font-size="12.5" fill="#065f46">• workspace 工具：装载 ✓</text>
    <text x="494" y="324" font-size="12.5" fill="#065f46">• beforeToolCall：放行/审批</text>
    <text x="494" y="344" font-size="12.5" fill="#065f46">• 系统提示词：有 workspace ✓</text>
    <text x="494" y="364" font-size="12.5" fill="#065f46">• 前端面板全部可用 ✓</text>
  </g>

  <text x="620" y="402" text-anchor="middle" font-size="12.5" fill="#9f1239">→ 对话与项目能力割裂；用户必须在项目里才能用文件工具</text>

  <!-- ============ AFTER ============ -->
  <rect x="24" y="446" width="1192" height="410" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="48" y="476" font-size="18" font-weight="700" fill="#047857">② 目标 After — global 对话注入默认 workspace context</text>

  <!-- global lane after -->
  <g>
    <rect x="48" y="498" width="300" height="338" rx="12" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="68" y="526" font-size="14" font-weight="700" fill="#047857">新对话 (global)</text>
    <text x="68" y="548" font-size="13" fill="#334155">scope = 'global'</text>
    <text x="68" y="568" font-size="13" fill="#334155">projectId = null</text>
    <text x="68" y="596" font-size="13" fill="#334155">→ createAgent()</text>
    <rect x="60" y="612" width="276" height="208" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="72" y="636" font-size="13" font-weight="600" fill="#065f46">projectContext = 合成上下文</text>
    <text x="72" y="656" font-size="12" fill="#047857">{ project: null,</text>
    <text x="72" y="674" font-size="12" fill="#047857">  workspaceRoot: dataDir/workspace }</text>
    <text x="72" y="700" font-size="12.5" fill="#065f46">• workspace 工具：装载 ✓</text>
    <text x="72" y="720" font-size="12.5" fill="#065f46">• 沙箱限制在 workspace 内</text>
    <text x="72" y="740" font-size="12.5" fill="#065f46">• 系统提示词：注入 ✓</text>
    <text x="72" y="760" font-size="12.5" fill="#065f46">• 读放行 / 写按 YOLO 审批</text>
    <text x="72" y="798" font-size="12.5" font-weight="700" fill="#047857">= 与项目对话能力一致 ✓</text>
  </g>

  <!-- center: default workspace source -->
  <g>
    <rect x="470" y="498" width="300" height="180" rx="12" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="490" y="526" font-size="14" font-weight="700" fill="#3730a3">默认目录来源（接入点）</text>
    <text x="490" y="552" font-size="12.5" fill="#1e293b">激活"死变量" defaultWorkspaceRoot：</text>
    <rect x="482" y="566" width="276" height="50" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="492" y="586" font-size="12" fill="#3730a3">setDefaultWorkspaceRoot(</text>
    <text x="502" y="604" font-size="12" fill="#3730a3">env.QF_WORKSPACE_DIR || dataDir/workspace)</text>
    <text x="490" y="638" font-size="12.5" fill="#1e293b">• 启动 ensureDir 创建该目录</text>
    <text x="490" y="658" font-size="12.5" fill="#1e293b">• global 会话回退到此 context</text>
  </g>

  <!-- project lane after -->
  <g>
    <rect x="470" y="700" width="300" height="136" rx="12" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="490" y="728" font-size="14" font-weight="700" fill="#047857">项目对话 (project)</text>
    <text x="490" y="752" font-size="13" fill="#334155">逻辑完全不变</text>
    <text x="490" y="776" font-size="12.5" fill="#065f46">• 仍走 projectContextFromId</text>
    <text x="490" y="796" font-size="12.5" fill="#065f46">• project.path 作为 workspace</text>
    <text x="490" y="816" font-size="12.5" fill="#065f46">• 切换项目照常生效</text>
  </g>

  <!-- frontend after -->
  <g>
    <rect x="900" y="498" width="292" height="338" rx="12" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="920" y="526" font-size="14" font-weight="700" fill="#047857">前端 (global)</text>
    <rect x="912" y="542" width="268" height="280" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="924" y="566" font-size="13" font-weight="600" fill="#065f46">currentToolProject = 合成默认对象</text>
    <text x="924" y="588" font-size="11.5" fill="#047857">{ name:'workspace', path:workspace,</text>
    <text x="924" y="604" font-size="11.5" fill="#047857">  id: 哨兵(如 'default') }</text>
    <text x="924" y="632" font-size="12.5" fill="#065f46">• 工作区面板按钮 enabled ✓</text>
    <text x="924" y="652" font-size="12.5" fill="#065f46">• TerminalDock cwd = workspace</text>
    <text x="924" y="672" font-size="12.5" fill="#065f46">• 文件树/Git/artifact 可用 ✓</text>
    <text x="944" y="690" font-size="11.5" fill="#059669">（git/索引缓存走 cache/global）</text>
    <text x="924" y="724" font-size="12.5" font-weight="600" fill="#065f46">关键：放宽 currentToolProject?.id</text>
    <text x="924" y="744" font-size="11.5" fill="#334155">App.tsx 的 8 处判断天然满足</text>
    <text x="924" y="772" font-size="12.5" fill="#065f46">• 面包屑显示 "workspace /"</text>
    <text x="924" y="794" font-size="11.5" fill="#475569">需 UI 文案区分"默认/项目"</text>
  </g>

  <!-- arrows -->
  <line x1="348" y1="270" x2="470" y2="588" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="588" x2="900" y2="685" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="348" y1="780" x2="470" y2="780" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
